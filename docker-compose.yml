services:
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot:ro
      - letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - backend

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      PORT: "4000"
      CORS_ORIGIN: "http://localhost:3000,http://72.62.177.48,https://www.abo-shama.com,https://abo-shama.com"
    expose:
      - "4000"
    depends_on:
      postgres:
        condition: service_healthy
    command: ["sh", "./docker-entrypoint.sh"]

  frontend:
    build:
      context: ../dafater-frontend
      args:
        NEXT_PUBLIC_API_URL: "https://abo-shama.com"
    restart: unless-stopped
    expose:
      - "3000"
    depends_on:
      - backend

volumes:
  pgdata:
  certbot_www:
  letsencrypt:
