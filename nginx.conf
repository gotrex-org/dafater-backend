# nginx reverse proxy for the whole stack (runs as a container in docker-compose).
# Port 80: serves the ACME challenge and redirects everything else to HTTPS — except
#          on the IP/unknown-host fallback below, which stays on plain HTTP since no
#          certificate can exist for a bare IP.
# Port 443: terminates TLS (Let's Encrypt cert) and proxies to frontend/backend.
#
# This is the ONLY deployment — domain and IP both reach the same frontend/backend
# containers, nginx just routes on the Host header. No second stack, no code changes
# needed on either side (frontend calls the API via a same-origin relative path).

# ---- HTTP :80 — ACME challenge + redirect to HTTPS (domain only) ----
server {
    listen 80;
    server_name abo-shama.com www.abo-shama.com;

    # Let's Encrypt renewal challenge must stay on plain HTTP.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Everything else → force HTTPS.
    location / {
        return 301 https://$host$request_uri;
    }
}

# ---- HTTPS :443 — the real site (domain, once DNS/cert are valid) ----
server {
    listen 443 ssl;
    http2 on;
    server_name abo-shama.com;

    ssl_certificate     /etc/letsencrypt/live/abo-shama.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/abo-shama.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    client_max_body_size 20M;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # API → NestJS backend (global /api prefix; path forwarded unchanged).
    location /api/ {
        proxy_pass         http://backend:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Everything else → Next.js frontend.
    location / {
        proxy_pass         http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# ---- Fallback: bare IP / any other Host header — plain HTTP, no redirect ----
# Kicks in automatically whenever the domain isn't resolving (DNS outage, registrar
# issue, etc.) or whenever anyone hits the server directly by IP. Same containers,
# same app, same session — just no TLS, because no certificate authority will issue
# a trusted cert for a bare IP address. See the caveat about this in the deploy notes.
server {
    listen 80 default_server;
    server_name _;

    client_max_body_size 20M;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options        "SAMEORIGIN" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /api/ {
        proxy_pass         http://backend:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location / {
        proxy_pass         http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
