name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            set -e
            echo "::group::DIAGNOSTIC — server layout (structure only, no secret values)"
            ls -la /root/projects
            echo "--- docker-compose.yml: service names, build contexts, non-secret args (no cat — may hold live secrets) ---"
            grep -nE "^\s*[a-z_-]+:\s*$|context:|dockerfile:|NEXT_PUBLIC_API_URL|nginx\.conf|image:" /root/projects/docker-compose.yml 2>&1 || echo "(no file at this path)"
            echo "--- nginx.conf: routing lines only ---"
            grep -nE "server_name|proxy_pass|listen" /root/projects/nginx.conf 2>&1 || echo "(no file at this path)"
            echo "--- symlink checks ---"
            readlink -f /root/projects/docker-compose.yml 2>&1 || true
            readlink -f /root/projects/nginx.conf 2>&1 || true
            echo "--- dafater-frontend dir, if present ---"
            ls -la /root/projects/dafater-frontend 2>&1 || echo "(no such dir)"
            echo "::endgroup::"
            cd /root/projects/dafater-backend
            git fetch origin main
            git reset --hard origin/main
            cd /root/projects
            docker compose build backend
            docker compose up -d --no-deps backend
            docker image prune -f
